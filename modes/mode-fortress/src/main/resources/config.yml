# Fortress — every number here is an experiment. Nothing is hard-coded in the code.

fortress:
  # The buildable cube. Change it and old fortresses still load: the size travels with
  # the saved data.
  size: 20

  # How many fortresses a player may keep. One of them is the default.
  slots: 3

  # The End Crystal must stand on this block, and keep a pocket of air around itself —
  # that pocket is what stops a fortress from being a solid cube of obsidian.
  crystal:
    base: OBSIDIAN
    clearance-radius: 1     # 1 -> a 3x3 footprint, 2 -> 5x5
    clearance-height: 3     # blocks of headroom above the base

# The match map: an island you can dig, with a fortress pad at each end.
#
# Built once, on first start, IF there is no fortress map yet. A designer's map drops into
# plugins/PvPEngine/maps/ with the same markers: in its map.yml, and this never runs again.
#
# instances = how many Fortress matches can run at the same time.
map:
  world: fortress
  instances: 2

# The build zone: one instance per builder, in its own void world.
build:
  world: fortress_build
  size: 50                  # a 50x50x50 room around the cube
  spacing: 128              # distance between two builders' zones
  instances: 8              # how many people can build at the same time

# What may be placed, and how many of each.
#
# A block that is not listed cannot be placed at all. Tune freely — this list is the whole
# balance of the mode, and it is meant to be argued about.
#
# IMPORTANT: name the BLOCK, not the item you hold. Redstone dust is the item REDSTONE but
# the block REDSTONE_WIRE; string is the item STRING but the block TRIPWIRE. The engine
# checks what lands, not what you were carrying.
#
# A door is TWO blocks (upper and lower halves), so it costs two from its quota.
palette:
  # Structure — cheap, weak
  OAK_PLANKS: 400
  OAK_LOG: 200
  COBBLESTONE: 500
  STONE_BRICKS: 400
  DIRT: 200
  GLASS: 100

  # Structure — solid
  STONE: 400
  DEEPSLATE_BRICKS: 250
  IRON_BARS: 80

  # Expensive, slow to dig: this is the real defensive budget
  OBSIDIAN: 40

  # Getting around
  OAK_STAIRS: 128
  STONE_BRICK_STAIRS: 128
  OAK_DOOR: 16          # 2 blocks each -> 8 doors
  IRON_DOOR: 8          # 2 blocks each -> 4 doors, and only redstone opens them
  OAK_TRAPDOOR: 16
  IRON_TRAPDOOR: 8
  LADDER: 32
  TORCH: 32
  CHEST: 4

  # --- Redstone: the wiring of a trap ---
  REDSTONE_WIRE: 192    # the BLOCK name of redstone dust
  REDSTONE_TORCH: 32
  REDSTONE_BLOCK: 16
  REPEATER: 32
  COMPARATOR: 16
  OBSERVER: 16
  LEVER: 16
  STONE_BUTTON: 16
  STONE_PRESSURE_PLATE: 24
  OAK_PRESSURE_PLATE: 24
  TRIPWIRE_HOOK: 16
  TRIPWIRE: 32          # the BLOCK name of string laid on the ground
  TARGET: 8
  NOTE_BLOCK: 8

  # --- Redstone: the business end ---
  PISTON: 24
  STICKY_PISTON: 24
  DISPENSER: 8
  DROPPER: 8
  HOPPER: 8
  TNT: 12

  # --- Traps that need no wiring ---
  COBWEB: 12
  MAGMA_BLOCK: 16
  POINTED_DRIPSTONE: 16
  SLIME_BLOCK: 16
  HONEY_BLOCK: 16
  CAMPFIRE: 8
