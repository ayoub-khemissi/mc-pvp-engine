# PvP Engine configuration.

database:
  host: 127.0.0.1
  port: 3306
  name: pvp_engine
  user: pvp
  password: change-me
  pool-size: 10

# The PvP world.
#
# It is a VOID world: nothing is generated at all. The only blocks that exist are the
# ones the engine places (the lobby island and the arena islands).
world:
  name: pvp
  # Create the void world on first start.
  auto-create: true

  # Build the development map on first start, IF there is no map yet.
  # This is what makes a fresh server playable without anyone typing a command.
  #
  # N arenas = N matches can run at the same time.
  # Set to 0 once you have real, designed maps in plugins/PvPEngine/maps/.
  #
  # You can always rebuild it by hand with:  /pvpadmin setup <N>
  auto-setup-arenas: 4

# Where players land. Written for you when the development map is built.
lobby:
  world: pvp
  x: 0.5
  y: 101.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0
