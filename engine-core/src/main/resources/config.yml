# PvP Engine configuration.

database:
  host: 127.0.0.1
  port: 3306
  name: pvp_engine
  user: pvp
  password: change-me
  pool-size: 10

# The PvP world.
#
# It is a VOID world: nothing is generated at all. The only blocks that exist are the
# ones the engine places (the lobby island and the arena islands).
world:
  name: pvp
  # Create the void world on first start.
  auto-create: true

  # Build the development map on first start, IF there is no map yet.
  # This is what makes a fresh server playable without anyone typing a command.
  #
  # N arenas = N matches can run at the same time.
  # Set to 0 once you have real, designed maps in plugins/PvPEngine/maps/.
  #
  # You can always rebuild it by hand with:  /pvpadmin setup <N>
  auto-setup-arenas: 4

  # HOW FAR AN ARENA IS RENDERED AND TICKED. The most expensive number in this file.
  #
  # Every player forces the chunks around them to LOAD. At the server's default view-distance
  # of 10, that is 21 x 21 = 441 chunks PER PLAYER — to render a duel arena that is 9 chunks
  # big and walled in on every side. Multiply by a hundred matches and the server is holding
  # tens of thousands of chunks nobody will ever see.
  #
  # A duel arena is 48 blocks across = 3 chunks. view-distance 5 (80 blocks) covers it with
  # room to spare. Nothing about the game changes: the player already could not see past the
  # barrier wall. What changes is that the same hundred matches cost a fraction of the memory.
  #
  # Raise it if a mode has a bigger map (Fortress islands are 128 blocks = 8 chunks).
  # Set to 0 to leave the server's own settings alone.
  view-distance: 5
  # How far the world is actually TICKED (mobs, redstone, block updates). Never above
  # view-distance — you would be ticking what nobody can see.
  simulation-distance: 4

  # The locator bar: the strip of dots above the hotbar showing where every player is.
  #
  # Minecraft turns it on by default, which on a PvP server is a wallhack — waypoints are
  # broadcast across the whole dimension, past the view distance and straight through walls.
  # An attacker knows where the defenders are standing inside a fortress they cannot see into.
  #
  # Per WORLD: there is no way to show a player their team-mates and hide their enemies, so it
  # is off for everyone. Turn it on for a mode where knowing where people are IS the game.
  locator-bar: false

# Game modes.
#
# A mode is its own plugin: it appears here as soon as its jar is in plugins/.
# Everything below is OPTIONAL — a mode nobody configured is enabled, at the rank it
# declares in its own code.
#
#   enabled: false  → installed, but gone from the Play menu, and impossible to queue for.
#   order:          → where it sits in the menu. Lower comes first.
#
# The rank is a position, not an index: switching duel off does not renumber anything,
# fortress simply becomes the first entry left.
modes:
  duel:
    enabled: true
    order: 1

# Matches.
match:
  # How long a disconnected player keeps their place. A dropped connection in minute
  # twenty of a thirty-minute match should not end it.
  rejoin-seconds: 90

# Parties: playing with friends.
#
# A party queues as ONE ticket, so its members are never split across two teams.
# max-size should be the biggest team you support: 5 lets a full 5v5 team queue together.
# A party can only queue for a format whose team is at least as big as the party.
party:
  max-size: 5

# Where players land. Written for you when the development map is built.
lobby:
  world: pvp
  x: 0.5
  y: 101.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0
